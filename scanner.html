<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYKASOFT - Barkod Tarayici</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .logo { background: #2563eb; padding: 0.25rem 0.5rem; border-radius: 6px; font-weight: 700; }
        .close-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .close-btn:hover { background: rgba(255,255,255,0.2); }
        
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        #scanner-video { width: 100%; max-width: 400px; border-radius: 16px; border: 3px solid #2563eb; }
        
        .scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 150px; border: 3px solid #10b981; border-radius: 12px; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #10b981; top: 50%; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        
        .scanner-guide { text-align: center; margin-top: 2rem; }
        .scanner-guide h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .scanner-guide p { color: rgba(255,255,255,0.7); }
        
        .result-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .result-modal.active { display: flex; }
        .result-content { background: white; width: 90%; max-width: 400px; border-radius: 16px; padding: 2rem; color: #0f172a; text-align: center; }
        .result-barcode { font-size: 1.5rem; font-weight: 700; color: #2563eb; background: #f1f5f9; padding: 1rem; border-radius: 12px; margin: 1rem 0; word-break: break-all; }
        .result-product { font-size: 1.25rem; font-weight: 600; margin: 1rem 0; }
        .result-price { font-size: 2rem; font-weight: 700; color: #c9242e; }
        .result-qty { display: flex; align-items: center; justify-content: center; gap: 1rem; margin: 1rem 0; }
        .qty-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #e2e8f0; background: white; font-size: 1.5rem; cursor: pointer; }
        .qty-btn:hover { background: #f1f5f9; }
        .qty-value { font-size: 2rem; font-weight: 700; min-width: 50px; text-align: center; }
        .result-total { font-size: 1.25rem; background: #f1f5f9; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .result-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .result-btn { flex: 1; padding: 1rem; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .result-btn.primary { background: #2563eb; color: white; }
        .result-btn.success { background: #10b981; color: white; }
        .result-btn.secondary { background: #64748b; color: white; }
        .result-not-found { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; margin: 1rem 0; }
        .result-not-found h3 { color: #dc2626; }
        
        .status { text-align: center; padding: 1rem; font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .status.active { color: #10b981; }
        
        .error-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-icon { font-size: 4rem; margin-bottom: 1rem; }
        .error-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .error-desc { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <header class="header">
        <div><span class="logo">AY</span> Barkod Tarayici</div>
        <button class="close-btn" onclick="closeScanner()">Kapat</button>
    </header>
    
    <div class="scanner-container" id="scannerContainer">
        <video id="scanner-video" autoplay playsinline></video>
        <div class="scanner-overlay">
            <div class="scanner-line"></div>
        </div>
        <div class="scanner-guide">
            <h2>📷 Barkod Okutun</h2>
            <p>Kamerayi barkodun uzerine getirin</p>
        </div>
        <div class="status" id="scannerStatus">Kamera bekleniyor...</div>
    </div>
    
    <div class="error-screen" id="errorScreen" style="display:none;">
        <div class="error-icon">📷</div>
        <div class="error-title">Kamera Erisimi Reddedildi</div>
        <div class="error-desc">Barkod taramak icin kameraya izin vermelisiniz.<br>Ayarlardan kamera erisimini acin.</div>
        <button class="result-btn primary" style="margin-top:1rem;" onclick="initScanner()">Tekrar Dene</button>
    </div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div id="resultFound">
                <h3 style="color:#64748b;">Bulunan Urun</h3>
                <div class="result-barcode" id="resultBarcode">-</div>
                <div class="result-product" id="resultProduct">-</div>
                <div class="result-price" id="resultPrice">₺ 0</div>
                <div class="result-qty">
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <div class="qty-value" id="resultQty">1</div>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <div class="result-total">Toplam: <strong id="resultTotal">₺ 0</strong></div>
                <div class="result-actions">
                    <button class="result-btn primary" onclick="addToCart()">Sepete Ekle</button>
                    <button class="result-btn success" onclick="quickSale()">Anlik Satis</button>
                </div>
                <button class="result-btn secondary" style="width:100%;margin-top:0.5rem;" onclick="closeResult()">Baska Urun Tara</button>
            </div>
            <div id="resultNotFound" style="display:none;">
                <div class="result-not-found">
                    <h3>❌ Urun Bulunamadi</h3>
                    <p>Barkod: <strong id="notFoundBarcode">-</strong></p>
                </div>
                <button class="result-btn primary" onclick="closeResult()">Baska Urun Tara</button>
            </div>
        </div>
    </div>
    
    <script>
        const currentUser = JSON.parse(localStorage.getItem('aykasoft_currentUser'));
        if (!currentUser) window.location.href = 'login.html';
        
        let codeReader = null;
        let selectedProduct = null;
        let qty = 1;
        let lastResult = null;
        
        // Demo urunler
        const products = [
            { barcode: '869123456001', name: 'Klavye', price: 450, stock: 25 },
            { barcode: '869123456002', name: 'Mouse', price: 280, stock: 30 },
            { barcode: '869123456003', name: 'Monitor', price: 2100, stock: 12 },
            { barcode: '869123456004', name: 'SSD 500GB', price: 890, stock: 18 },
            { barcode: '869123456005', name: 'Kulaklik', price: 350, stock: 22 },
            { barcode: '869123456006', name: 'USB Kablo', price: 80, stock: 50 },
            { barcode: '869123456007', name: 'Webcam', price: 590, stock: 15 },
            { barcode: '869123456008', name: 'USB Hub', price: 250, stock: 28 },
            { barcode: '869123456009', name: 'Kablo Set', price: 150, stock: 50 },
            { barcode: '869123456010', name: 'Mouse Pad', price: 80, stock: 60 },
            { barcode: '869123456011', name: 'Ekran Karti', price: 8500, stock: 5 },
            { barcode: '869123456012', name: 'RAM 16GB', price: 1200, stock: 14 },
            { barcode: '869123456013', name: 'Kasa', price: 1800, stock: 8 },
            { barcode: '869123456014', name: 'Anakart', price: 3200, stock: 6 },
            { barcode: '869123456015', name: 'Islemci', price: 6500, stock: 4 }
        ];
        
        function closeScanner() {
            if (codeReader) {
                codeReader.reset();
            }
            window.location.href = 'satis.html';
        }
        
        function changeQty(delta) {
            qty = Math.max(1, qty + delta);
            document.getElementById('resultQty').textContent = qty;
            document.getElementById('resultTotal').textContent = '₺ ' + (selectedProduct.price * qty).toLocaleString();
        }
        
        function findProduct(barcode) {
            const stored = JSON.parse(localStorage.getItem('aykasoft_products_' + currentUser.id)) || [];
            const storedProduct = stored.find(p => p.barcode === barcode);
            if (storedProduct) return storedProduct;
            return products.find(p => p.barcode === barcode);
        }
        
        function showResult(barcode, product) {
            document.getElementById('resultModal').classList.add('active');
            qty = 1;
            
            if (product) {
                selectedProduct = product;
                document.getElementById('resultFound').style.display = 'block';
                document.getElementById('resultNotFound').style.display = 'none';
                document.getElementById('resultBarcode').textContent = barcode;
                document.getElementById('resultProduct').textContent = product.name;
                document.getElementById('resultPrice').textContent = '₺ ' + product.price.toLocaleString();
                document.getElementById('resultQty').textContent = qty;
                document.getElementById('resultTotal').textContent = '₺ ' + product.price.toLocaleString();
            } else {
                document.getElementById('resultFound').style.display = 'none';
                document.getElementById('resultNotFound').style.display = 'block';
                document.getElementById('notFoundBarcode').textContent = barcode;
            }
        }
        
        function closeResult() {
            document.getElementById('resultModal').classList.remove('active');
            selectedProduct = null;
            if (codeReader) codeReader.reset();
            initScanner();
        }
        
        function addToCart() {
            if (!selectedProduct) return;
            
            const cart = JSON.parse(localStorage.getItem('aykasoft_cart_' + currentUser.id)) || [];
            const existing = cart.find(c => c.barcode === selectedProduct.barcode);
            if (existing) {
                existing.qty += qty;
            } else {
                cart.push({
                    barcode: selectedProduct.barcode,
                    name: selectedProduct.name,
                    price: selectedProduct.price,
                    qty: qty
                });
            }
            localStorage.setItem('aykasoft_cart_' + currentUser.id, JSON.stringify(cart));
            
            alert(selectedProduct.name + ' x' + qty + ' sepete eklendi!');
            closeResult();
        }
        
        function quickSale() {
            if (!selectedProduct) return;
            
            const sales = JSON.parse(localStorage.getItem('aykasoft_sales_' + currentUser.id)) || [];
            sales.push({
                id: 'SJS' + Date.now(),
                date: new Date().toLocaleDateString('tr-TR'),
                product: selectedProduct.name,
                barcode: selectedProduct.barcode,
                price: selectedProduct.price,
                qty: qty,
                total: selectedProduct.price * qty,
                type: 'nakit',
                status: 'Tamamlandi'
            });
            localStorage.setItem('aykasoft_sales_' + currentUser.id, JSON.stringify(sales));
            
            alert('Satis tamamlandi!');
            closeResult();
        }
        
        async function initScanner() {
            try {
                document.getElementById('scannerContainer').style.display = 'flex';
                document.getElementById('errorScreen').style.display = 'none';
                document.getElementById('scannerStatus').textContent = 'Kamera aciliyor...';
                document.getElementById('scannerStatus').className = 'status';
                
                codeReader = new ZXing.BrowserMultiFormatReader();
                
                await codeReader.listVideoInputDevices()
                    .then(videoInputDevices => {
                        if (videoInputDevices.length === 0) {
                            throw new Error('Kamera bulunamadi');
                        }
                        
                        // Arka kamerayi sec
                        let deviceId = videoInputDevices[0].deviceId;
                        const backCamera = videoInputDevices.find(d => 
                            d.label.toLowerCase().includes('back') || 
                            d.label.toLowerCase().includes('arka') ||
                            d.label.toLowerCase().includes('rear')
                        );
                        if (backCamera) deviceId = backCamera.deviceId;
                        
                        return codeReader.decodeFromVideoDevice(deviceId, 'scanner-video', (result, err) => {
                            if (result) {
                                const barcode = result.text;
                                if (barcode !== lastResult) {
                                    lastResult = barcode;
                                    const product = findProduct(barcode);
                                    showResult(barcode, product);
                                }
                            }
                        });
                    });
                
                document.getElementById('scannerStatus').textContent = 'Barkod bekleniyor...';
                document.getElementById('scannerStatus').className = 'status active';
                
            } catch (err) {
                console.error('Scanner error:', err);
                document.getElementById('scannerContainer').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'flex';
            }
        }
        
        initScanner();
    </script>
</body>
</html>
