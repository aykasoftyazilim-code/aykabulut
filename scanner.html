<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYKASOFT - Barkod</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100%; }
        
        .header { 
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); 
            padding: 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 10; 
        }
        .logo { background: #2563eb; padding: 0.4rem 0.6rem; border-radius: 8px; font-weight: 700; color: white; font-size: 0.85rem; }
        .close-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.9rem; }
        
        .scanner { flex: 1; position: relative; overflow: hidden; }
        #scanner-video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-area { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            height: 30%; 
            border: 3px solid #10b981; 
            border-radius: 16px; 
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }
        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 3px; 
            background: linear-gradient(90deg, transparent, #10b981, transparent); 
            animation: scanLine 2s infinite linear;
            box-shadow: 0 0 15px #10b981;
        }
        @keyframes scanLine { 0% { top: 5%; } 100% { top: 95%; } }
        
        .hint { 
            position: absolute; 
            bottom: 20%; 
            left: 0; 
            right: 0; 
            text-align: center; 
            color: white; 
            font-size: 1rem; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .manual-input {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
        }
        .manual-input input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: flex-end;
            z-index: 100;
            animation: slideUp 0.3s ease;
        }
        .modal.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 1.5rem;
            animation: slideUp 0.3s ease;
        }
        .modal-header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 1rem; }
        .modal-header h3 { color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .barcode-display { font-size: 1rem; font-weight: 600; color: #2563eb; background: #f5f5f5; padding: 0.75rem; border-radius: 10px; margin-top: 0.5rem; word-break: break-all; }
        
        .product-name { font-size: 1.75rem; font-weight: 700; text-align: center; margin: 0.5rem 0; }
        .product-price { font-size: 2.5rem; font-weight: 700; color: #c9242e; text-align: center; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 1.5rem 0; background: #f5f5f5; padding: 1rem; border-radius: 16px; }
        .qty-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #2563eb; color: white; font-size: 2rem; font-weight: 600; }
        .qty-val { font-size: 2.5rem; font-weight: 700; min-width: 60px; text-align: center; }
        
        .total-box { background: #0f172a; color: white; padding: 1rem; border-radius: 14px; text-align: center; font-size: 1.2rem; }
        .total-box strong { font-size: 1.75rem; }
        
        .actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .action-btn { flex: 1; padding: 1rem; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; }
        .btn-add { background: #2563eb; color: white; }
        .btn-sale { background: #10b981; color: white; }
        
        .skip-btn { width: 100%; margin-top: 0.75rem; padding: 1rem; border: none; border-radius: 14px; background: #64748b; color: white; font-weight: 600; }
        
        .not-found { text-align: center; padding: 1rem; }
        .not-found h3 { color: #dc2626; font-size: 1.5rem; }
        .not-found .code { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; font-weight: 600; margin: 1rem 0; }
        
        .loading { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 200;
        }
        .loading.hidden { display: none; }
        .loading-icon { font-size: 4rem; margin-bottom: 1rem; }
        .loading-text { color: white; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-icon">📷</div>
        <div class="loading-text">Kamera açılıyor...</div>
    </div>
    
    <div class="app">
        <header class="header">
            <div class="logo">AY</div>
            <button class="close-btn" onclick="goBack()">Kapat</button>
        </header>
        
        <div class="scanner">
            <video id="scanner-video" autoplay playsinline muted></video>
            <div class="scan-area">
                <div class="scan-line"></div>
            </div>
            <div class="hint">Barkodu tarama alanına getirin</div>
        </div>
        
        <div class="manual-input">
            <input type="text" id="manualCode" placeholder="Barkod numarasını girin" oninput="searchProduct(this.value)">
        </div>
    </div>
    
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div id="foundView">
                <div class="modal-header">
                    <h3>Ürün Bulundu</h3>
                    <div class="barcode-display" id="mBarcode">-</div>
                </div>
                <div class="product-name" id="mName">-</div>
                <div class="product-price" id="mPrice">₺ 0</div>
                
                <div class="qty-box">
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <div class="qty-val" id="mQty">1</div>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                
                <div class="total-box">Toplam: <strong id="mTotal">₺ 0</strong></div>
                
                <div class="actions">
                    <button class="action-btn btn-add" onclick="addToCart()">Sepete Ekle</button>
                    <button class="action-btn btn-sale" onclick="directSale()">Anlık Satış</button>
                </div>
                <button class="skip-btn" onclick="closeModal()">Başka Ürün</button>
            </div>
            
            <div id="notFoundView" style="display:none;">
                <div class="not-found">
                    <h3>❌ Ürün Bulunamadı</h3>
                    <div class="code" id="nfCode">-</div>
                    <button class="action-btn btn-add" onclick="closeModal()">Tamam</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    (function() {
        const user = JSON.parse(localStorage.getItem('aykasoft_currentUser'));
        if (!user) { window.location.href = 'login.html'; return; }
        
        let product = null;
        let qty = 1;
        let lastResult = '';
        let lastTime = 0;
        
        const products = [
            {barcode:'869123456001',name:'Klavye',price:450},
            {barcode:'869123456002',name:'Mouse',price:280},
            {barcode:'869123456003',name:'Monitor',price:2100},
            {barcode:'869123456004',name:'SSD 500GB',price:890},
            {barcode:'869123456005',name:'Kulaklık',price:350},
            {barcode:'869123456006',name:'USB Kablo',price:80},
            {barcode:'869123456007',name:'Webcam',price:590},
            {barcode:'869123456008',name:'USB Hub',price:250},
            {barcode:'869123456009',name:'Kablo Set',price:150},
            {barcode:'869123456010',name:'Mouse Pad',price:80},
            {barcode:'869123456011',name:'Ekran Kartı',price:8500},
            {barcode:'869123456012',name:'RAM 16GB',price:1200},
            {barcode:'869123456013',name:'Kasa',price:1800},
            {barcode:'869123456014',name:'Anakart',price:3200},
            {barcode:'869123456015',name:'İşlemci',price:6500}
        ];
        
        window.goBack = function() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            window.location.href = 'satis.html';
        };
        
        window.changeQty = function(delta) {
            qty = Math.max(1, qty + delta);
            document.getElementById('mQty').textContent = qty;
            document.getElementById('mTotal').textContent = '₺ ' + (product.price * qty).toLocaleString();
        };
        
        function findProduct(code) {
            const stored = JSON.parse(localStorage.getItem('aykasoft_products_' + user.id)) || [];
            const sp = stored.find(p => p.barcode === code);
            if (sp) return sp;
            return products.find(p => p.barcode === code);
        }
        
        window.searchProduct = function(code) {
            if (code.length < 3) return;
            code = code.trim();
            const p = findProduct(code);
            if (p) showProduct(code, p);
            else if (code.length >= 8) showProduct(code, null);
        };
        
        function showProduct(code, p) {
            document.getElementById('productModal').classList.add('active');
            qty = 1;
            product = p;
            
            if (p) {
                document.getElementById('foundView').style.display = 'block';
                document.getElementById('notFoundView').style.display = 'none';
                document.getElementById('mBarcode').textContent = code;
                document.getElementById('mName').textContent = p.name;
                document.getElementById('mPrice').textContent = '₺ ' + p.price.toLocaleString();
                document.getElementById('mQty').textContent = qty;
                document.getElementById('mTotal').textContent = '₺ ' + p.price.toLocaleString();
            } else {
                document.getElementById('foundView').style.display = 'none';
                document.getElementById('notFoundView').style.display = 'block';
                document.getElementById('nfCode').textContent = code;
            }
        }
        
        window.closeModal = function() {
            document.getElementById('productModal').classList.remove('active');
            document.getElementById('manualCode').value = '';
            product = null;
        };
        
        window.addToCart = function() {
            if (!product) return;
            const cart = JSON.parse(localStorage.getItem('aykasoft_cart_' + user.id)) || [];
            const ex = cart.find(c => c.barcode === product.barcode);
            if (ex) ex.qty += qty;
            else cart.push({barcode:product.barcode,name:product.name,price:product.price,qty:qty});
            localStorage.setItem('aykasoft_cart_' + user.id, JSON.stringify(cart));
            alert(product.name + ' x' + qty + ' sepete eklendi!');
            closeModal();
            setTimeout(() => window.location.href = 'satis.html', 300);
        };
        
        window.directSale = function() {
            if (!product) return;
            const sales = JSON.parse(localStorage.getItem('aykasoft_sales_' + user.id)) || [];
            sales.push({
                id:'SJS'+Date.now(),
                date:new Date().toLocaleDateString('tr-TR'),
                product:product.name,
                barcode:product.barcode,
                price:product.price,
                qty:qty,
                total:product.price*qty,
                type:'nakit',
                status:'Tamamlandı'
            });
            localStorage.setItem('aykasoft_sales_' + user.id, JSON.stringify(sales));
            alert('Satış tamamlandı!');
            closeModal();
            setTimeout(() => window.location.href = 'satis.html', 300);
        };
        
        let stream = null;
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                
                const video = document.getElementById('scanner-video');
                video.srcObject = stream;
                document.getElementById('loading').classList.add('hidden');
                
                // Barcode detector
                if ('BarcodeDetector' in window) {
                    const detector = new BarcodeDetector({
                        formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e']
                    });
                    detectBarcode(video, detector);
                } else {
                    // Fallback for iOS Safari - use Quagga
                    loadQuagga();
                }
            } catch(err) {
                console.error(err);
                document.getElementById('loading').innerHTML = '<div style="color:white;text-align:center;padding:2rem;"><h3>Kamera Hatası</h3><p>' + err.message + '</p><button onclick="startCamera()" style="padding:1rem;margin-top:1rem;background:#2563eb;color:white;border:none;border-radius:8px;">Tekrar Dene</button></div>';
            }
        }
        
        async function detectBarcode(video, detector) {
            async function scan() {
                if (document.getElementById('productModal').classList.contains('active')) {
                    requestAnimationFrame(scan);
                    return;
                }
                
                try {
                    const barcodes = await detector.detect(video);
                    if (barcodes.length > 0) {
                        const code = barcodes[0].rawValue;
                        const now = Date.now();
                        if (code !== lastResult && now - lastTime > 1500) {
                            lastResult = code;
                            lastTime = now;
                            showProduct(code, findProduct(code));
                        }
                    }
                } catch(e) {}
                requestAnimationFrame(scan);
            }
            scan();
        }
        
        function loadQuagga() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js';
            script.onload = initQuagga;
            document.head.appendChild(script);
        }
        
        function initQuagga() {
            Quagga.init({
                inputStream: {
                    name: 'Live',
                    type: 'LiveStream',
                    target: document.getElementById('scanner-video'),
                    constraints: { facingMode: 'environment' }
                },
                decoder: { readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader'] },
                locate: true,
                frequency: 10
            }, function(err) {
                if (err) { console.error(err); return; }
                Quagga.start();
                Quagga.onDetected(function(result) {
                    const code = result.codeResult.code;
                    const now = Date.now();
                    if (code !== lastResult && now - lastTime > 1500) {
                        lastResult = code;
                        lastTime = now;
                        showProduct(code, findProduct(code));
                    }
                });
            });
        }
        
        startCamera();
    })();
    </script>
</body>
</html>
