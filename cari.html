<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Takip - AYKASOFT</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --light-secondary: #e2e8f0; --text: #334155; --text-light: #64748b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --tl: #c9242e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--dark); color: white; padding: 1rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
        .header a { color: white; text-decoration: none; font-size: 1.25rem; }
        .header h1 { flex: 1; font-size: 1.1rem; font-family: 'Outfit', sans-serif; font-weight: 700; }
        
        .main { padding: 1rem; padding-bottom: 80px; }
        
        .stats-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 14px; padding: 1.25rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; font-size: 1.25rem; }
        .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.8rem; color: var(--text-light); margin-top: 0.25rem; }
        
        .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
        .action-btn { background: white; border: none; border-radius: 14px; padding: 1.25rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; cursor: pointer; font-weight: 600; font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-family: inherit; }
        
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; }
        .tab { padding: 0.75rem 1.25rem; border-radius: 10px; font-weight: 600; background: white; border: none; cursor: pointer; white-space: nowrap; font-family: inherit; }
        .tab.active { background: var(--primary); color: white; }
        
        .search-box { background: white; padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 1rem; display: flex; gap: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .search-box input { flex: 1; border: none; font-size: 1rem; outline: none; font-family: inherit; }
        .search-box button { background: none; border: none; font-size: 1.25rem; cursor: pointer; }
        
        .section-title { font-size: 1rem; margin-bottom: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .section-title .count { font-size: 0.85rem; color: var(--text-light); font-weight: 400; }
        
        .cari-list { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .cari-item { display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid var(--light-secondary); cursor: pointer; }
        .cari-item:last-child { border-bottom: none; }
        .cari-item:active { background: var(--light); }
        .cari-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 1rem; font-size: 1.25rem; font-weight: 700; flex-shrink: 0; }
        .cari-info { flex: 1; min-width: 0; }
        .cari-info h4 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .cari-info p { font-size: 0.85rem; color: var(--text-light); }
        .cari-info .cari-tel { font-size: 0.85rem; color: var(--primary); }
        .cari-balance { font-weight: 700; font-size: 1.1rem; text-align: right; }
        .cari-arrow { color: var(--text-light); font-size: 1.25rem; margin-left: 0.5rem; }
        
        .add-btn { position: fixed; bottom: 70px; right: 1rem; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); z-index: 50; display: flex; align-items: center; justify-content: center; }
        
        .empty { text-align: center; padding: 3rem; color: var(--text-light); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 1.5rem; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h3 { font-size: 1.25rem; }
        .modal-close { width: 40px; height: 40px; border-radius: 50%; background: var(--light); border: none; font-size: 1.25rem; cursor: pointer; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.875rem; border: 1px solid var(--light-secondary); border-radius: 10px; font-size: 1rem; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--light); color: var(--text); margin-top: 0.5rem; }
        
        .detail-header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 1.5rem; border-radius: 16px; margin-bottom: 1rem; }
        .detail-header .name { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .detail-header .phone { opacity: 0.9; margin-bottom: 0.25rem; }
        .detail-header .address { opacity: 0.8; font-size: 0.9rem; }
        
        .detail-balance { background: white; border-radius: 12px; padding: 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .detail-balance .label { color: var(--text-light); }
        .detail-balance .value { font-size: 1.75rem; font-weight: 700; }
        
        .detail-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
        .detail-action { background: white; border: none; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-family: inherit; }
        .detail-action .icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .detail-action .label { font-size: 0.8rem; font-weight: 600; }
        
        .ekstre-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-top: 1rem; }
        .ekstre-header { padding: 1rem; background: var(--light); display: flex; justify-content: space-between; align-items: center; }
        .ekstre-header h4 { font-size: 1rem; }
        .ekstre-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--light-secondary); }
        .ekstre-item:last-child { border-bottom: none; }
        .ekstre-item .date { font-size: 0.8rem; color: var(--text-light); width: 70px; }
        .ekstre-item .desc { flex: 1; font-size: 0.9rem; }
        .ekstre-item .amount { font-weight: 700; font-size: 0.95rem; }
        .ekstre-total { padding: 1rem; background: var(--dark); color: white; display: flex; justify-content: space-between; font-weight: 700; }
        
        .mobile-nav { display: none; }
        
        @media (max-width: 768px) {
            .stats-overview { grid-template-columns: 1fr; }
            .quick-actions { display: none; }
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); padding: 0.5rem; justify-content: space-around; z-index: 1000; }
            .mobile-nav a { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.7rem; }
            .mobile-nav a.active { color: white; }
            .add-btn { bottom: 70px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="dashboard.html">←</a>
        <h1>👥 Cari Takip</h1>
    </header>
    
    <main class="main">
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-icon" style="background:#dbeafe;color:#2563eb;"><i class="fas fa-users"></i></div>
                <div class="stat-value" id="toplamCari">0</div>
                <div class="stat-label">Toplam Cari</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fef3c7;color:#f59e0b;"><i class="fas fa-arrow-up"></i></div>
                <div class="stat-value tl" id="toplamAlacak" style="color:var(--warning);">₺ 0</div>
                <div class="stat-label">Toplam Alacak</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fee2e2;color:#ef4444;"><i class="fas fa-arrow-down"></i></div>
                <div class="stat-value tl" id="toplamBorc" style="color:var(--danger);">₺ 0</div>
                <div class="stat-label">Toplam Borç</div>
            </div>
        </div>
        
        <div class="quick-actions">
            <button class="action-btn" onclick="alert('Önce cari seçiniz!')">
                <i class="fas fa-arrow-down" style="color:var(--success);"></i> Tahsilat
            </button>
            <button class="action-btn" onclick="alert('Önce cari seçiniz!')">
                <i class="fas fa-arrow-up" style="color:var(--danger);"></i> Ödeme
            </button>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="filterTab('all', this)">Tümü</button>
            <button class="tab" onclick="filterTab('musteri', this)">Müşteri</button>
            <button class="tab" onclick="filterTab('tedarikci', this)">Tedarikçi</button>
        </div>
        
        <div class="search-box">
            <button>🔍</button>
            <input type="text" placeholder="Cari ara..." id="searchInput" onkeyup="renderCariler()">
        </div>
        
        <h2 class="section-title">
            👥 Müşteriler <span class="count" id="musteriCount">(0)</span>
        </h2>
        <div class="cari-list" id="musteriList"></div>
        
        <h2 class="section-title">
            🏪 Tedarikçiler <span class="count" id="tedarikciCount">(0)</span>
        </h2>
        <div class="cari-list" id="tedarikciList"></div>
    </main>
    
    <button class="add-btn" onclick="openAddModal()">+</button>
    
    <!-- Add/Edit Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Yeni Cari</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Cari Adı / Ünvan *</label>
                <input type="text" id="cariAd" placeholder="Ad Soyad veya Firma Adı">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="cariTel" placeholder="0532 123 4567">
                </div>
                <div class="form-group">
                    <label>Tip</label>
                    <select id="cariTip">
                        <option value="musteri">Müşteri</option>
                        <option value="tedarikci">Tedarikçi</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Adres</label>
                <textarea id="cariAdres" rows="2" placeholder="Adres"></textarea>
            </div>
            <div class="form-group">
                <label>Başlangıç Bakiyesi</label>
                <input type="number" id="cariBakiye" placeholder="0" value="0">
            </div>
            <button class="btn btn-primary" onclick="saveCari()">Kaydet</button>
            <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
            <button class="btn btn-danger" id="deleteBtn" onclick="deleteCari()" style="margin-top:0.5rem;display:none;">Sil</button>
        </div>
    </div>
    
    <!-- Detail Modal with Ekstre -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Cari Detay</h3>
                <button class="modal-close" onclick="closeDetail()">×</button>
            </div>
            
            <div class="detail-header">
                <div class="name" id="detailAd">-</div>
                <div class="phone" id="detailTel">-</div>
                <div class="address" id="detailAdres">-</div>
            </div>
            
            <div class="detail-balance">
                <span class="label">Güncel Bakiye</span>
                <span class="value" id="detailBakiye">₺ 0</span>
            </div>
            
            <div class="detail-actions">
                <button class="detail-action" onclick="openIslem('tahsilat')">
                    <div class="icon" style="background:#d1fae5;color:#10b981;"><i class="fas fa-arrow-down"></i></div>
                    <div class="label">Tahsilat</div>
                </button>
                <button class="detail-action" onclick="openIslem('odeme')">
                    <div class="icon" style="background:#fee2e2;color:#ef4444;"><i class="fas fa-arrow-up"></i></div>
                    <div class="label">Ödeme</div>
                </button>
                <button class="detail-action" onclick="openEdit()">
                    <div class="icon" style="background:#dbeafe;color:#2563eb;"><i class="fas fa-edit"></i></div>
                    <div class="label">Düzenle</div>
                </button>
            </div>
            
            <!-- Cari Hesap Ekstresi -->
            <div class="ekstre-card">
                <div class="ekstre-header">
                    <h4>📋 Cari Hesap Ekstresi</h4>
                </div>
                <div id="ekstreList">
                    <div class="empty" style="padding:2rem;">İşlem bulunamadı</div>
                </div>
                <div class="ekstre-total">
                    <span>Devir Bakiye</span>
                    <span id="ekstreBakiye">₺ 0</span>
                </div>
            </div>
            
            <button class="btn btn-secondary" onclick="closeDetail()">Kapat</button>
        </div>
    </div>
    
    <!-- Islem Modal -->
    <div class="modal" id="islemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="islemTitle">İşlem</h3>
                <button class="modal-close" onclick="closeIslem()">×</button>
            </div>
            <div class="form-group">
                <label>Tutar *</label>
                <input type="number" id="islemTutar" placeholder="0">
            </div>
            <div class="form-group">
                <label>Açıklama</label>
                <input type="text" id="islemAciklama" placeholder="Açıklama (opsiyonel)">
            </div>
            <button class="btn btn-primary" onclick="saveIslem()">Kaydet</button>
            <button class="btn btn-secondary" onclick="closeIslem()">İptal</button>
        </div>
    </div>
    
    <nav class="mobile-nav">
        <a href="dashboard.html"><span>🏠</span><span>Panel</span></a>
        <a href="satis.html"><span>🏷️</span><span>Satış</span></a>
        <a href="saha.html"><span>📱</span><span>Saha</span></a>
        <a href="rapor.html"><span>📊</span><span>Rapor</span></a>
        <a href="ayarlar.html"><span>⚙️</span><span>Ayarlar</span></a>
    </nav>
    
    <script>
        const currentUser = JSON.parse(localStorage.getItem('aykasoft_currentUser'));
        if (!currentUser) window.location.href = 'login.html';
        
        let cariler = JSON.parse(localStorage.getItem('aykasoft_cari_' + currentUser.id)) || [];
        let islemler = JSON.parse(localStorage.getItem('aykasoft_islemler_' + currentUser.id)) || [];
        
        if (cariler.length === 0) {
            cariler = [
                {id:1, ad:'Ahmet Yılmaz', tel:'0532 123 4567', adres:'Selçuklu, Konya', tip:'musteri', bakiye:12500},
                {id:2, ad:'Mehmet Kaya', tel:'0533 234 5678', adres:'Meram, Konya', tip:'musteri', bakiye:8900},
                {id:3, ad:'Ali Demir', tel:'0544 345 6789', adres:'Çumra, Konya', tip:'musteri', bakiye:4500},
                {id:4, ad:'Ayşe Fatma', tel:'0535 456 7890', adres:'Karatay, Konya', tip:'musteri', bakiye:0},
                {id:5, ad:'ABC Ltd. Şti', tel:'0312 111 2233', adres:'Ankara', tip:'tedarikci', bakiye:-8500},
                {id:6, ad:'XYZ A.Ş', tel:'0212 444 5566', adres:'İstanbul', tip:'tedarikci', bakiye:-12300},
                {id:7, ad:'Beta Ticaret', tel:'0322 555 6677', adres:'Antalya', tip:'tedarikci', bakiye:-2500},
            ];
            localStorage.setItem('aykasoft_cari_' + currentUser.id, JSON.stringify(cariler));
        }
        
        let editId = -1;
        let selectedCari = null;
        let islemType = 'tahsilat';
        
        renderCariler();
        
        function renderCariler() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const musteriler = cariler.filter(c => c.tip === 'musteri' && (c.ad.toLowerCase().includes(search) || c.tel.includes(search)));
            const tedarikciler = cariler.filter(c => c.tip === 'tedarikci' && (c.ad.toLowerCase().includes(search) || c.tel.includes(search)));
            
            const alacak = cariler.filter(c => c.tip === 'musteri' && c.bakiye > 0).reduce((s, c) => s + c.bakiye, 0);
            const borc = cariler.filter(c => c.tip === 'tedarikci' && c.bakiye < 0).reduce((s, c) => s + Math.abs(c.bakiye), 0);
            
            document.getElementById('toplamCari').textContent = cariler.length;
            document.getElementById('toplamAlacak').textContent = '₺ ' + alacak.toLocaleString();
            document.getElementById('toplamBorc').textContent = '₺ ' + borc.toLocaleString();
            
            document.getElementById('musteriCount').textContent = '(' + musteriler.length + ')';
            document.getElementById('tedarikciCount').textContent = '(' + tedarikciler.length + ')';
            
            document.getElementById('musteriList').innerHTML = musteriler.map(c => `
                <div class="cari-item" onclick="openDetail(${c.id})">
                    <div class="cari-avatar" style="background:#dbeafe;color:#2563eb;">${c.ad[0]}</div>
                    <div class="cari-info">
                        <h4>${c.ad}</h4>
                        <p>${c.adres}</p>
                        <p class="cari-tel">${c.tel}</p>
                    </div>
                    <div class="cari-balance" style="color:${c.bakiye > 0 ? 'var(--warning)' : c.bakiye < 0 ? 'var(--danger)' : 'var(--text)'}">
                        ₺ ${Math.abs(c.bakiye).toLocaleString()}
                        ${c.bakiye > 0 ? ' ALACAK' : c.bakiye < 0 ? ' BORÇ' : ''}
                    </div>
                    <div class="cari-arrow">›</div>
                </div>
            `).join('') || '<div class="empty">Müşteri bulunamadı</div>';
            
            document.getElementById('tedarikciList').innerHTML = tedarikciler.map(c => `
                <div class="cari-item" onclick="openDetail(${c.id})">
                    <div class="cari-avatar" style="background:#fce7f3;color:#ec4899;">${c.ad[0]}</div>
                    <div class="cari-info">
                        <h4>${c.ad}</h4>
                        <p>${c.adres}</p>
                        <p class="cari-tel">${c.tel}</p>
                    </div>
                    <div class="cari-balance" style="color:var(--danger);">
                        ₺ ${Math.abs(c.bakiye).toLocaleString()} BORÇ
                    </div>
                    <div class="cari-arrow">›</div>
                </div>
            `).join('') || '<div class="empty">Tedarikçi bulunamadı</div>';
        }
        
        function filterTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }
        
        function openAddModal() {
            editId = -1;
            document.getElementById('modalTitle').textContent = 'Yeni Cari';
            document.getElementById('cariAd').value = '';
            document.getElementById('cariTel').value = '';
            document.getElementById('cariAdres').value = '';
            document.getElementById('cariBakiye').value = '0';
            document.getElementById('cariTip').value = 'musteri';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('addModal').classList.add('active');
        }
        
        function openEdit() {
            const c = selectedCari;
            editId = c.id;
            document.getElementById('modalTitle').textContent = 'Cari Düzenle';
            document.getElementById('cariAd').value = c.ad;
            document.getElementById('cariTel').value = c.tel;
            document.getElementById('cariAdres').value = c.adres;
            document.getElementById('cariBakiye').value = c.bakiye;
            document.getElementById('cariTip').value = c.tip;
            document.getElementById('deleteBtn').style.display = 'block';
            closeDetail();
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }
        
        function saveCari() {
            const ad = document.getElementById('cariAd').value.trim();
            const tel = document.getElementById('cariTel').value.trim();
            const adres = document.getElementById('cariAdres').value.trim();
            const bakiye = parseFloat(document.getElementById('cariBakiye').value) || 0;
            const tip = document.getElementById('cariTip').value;
            
            if (!ad) { alert('Lütfen cari adı girin!'); return; }
            
            if (editId > 0) {
                const cari = cariler.find(c => c.id === editId);
                cari.ad = ad;
                cari.tel = tel;
                cari.adres = adres;
                cari.bakiye = bakiye;
                cari.tip = tip;
                cari.guncellenme = new Date().toLocaleDateString('tr-TR');
            } else {
                cariler.push({
                    id: Date.now(),
                    ad, tel, adres, bakiye, tip,
                    olusturma: new Date().toLocaleDateString('tr-TR')
                });
            }
            
            localStorage.setItem('aykasoft_cari_' + currentUser.id, JSON.stringify(cariler));
            alert('Kaydedildi!');
            closeModal();
            renderCariler();
        }
        
        function deleteCari() {
            if (!confirm('Bu cariyi silmek istediğinizden emin misiniz?')) return;
            cariler = cariler.filter(c => c.id !== editId);
            localStorage.setItem('aykasoft_cari_' + currentUser.id, JSON.stringify(cariler));
            alert('Silindi!');
            closeModal();
            renderCariler();
        }
        
        function openDetail(id) {
            selectedCari = cariler.find(c => c.id === id);
            if (!selectedCari) return;
            
            document.getElementById('detailAd').textContent = selectedCari.ad;
            document.getElementById('detailTel').textContent = selectedCari.tel;
            document.getElementById('detailAdres').textContent = selectedCari.adres;
            document.getElementById('detailBakiye').textContent = '₺ ' + selectedCari.bakiye.toLocaleString();
            document.getElementById('detailBakiye').style.color = selectedCari.bakiye > 0 ? 'var(--warning)' : selectedCari.bakiye < 0 ? 'var(--danger)' : 'var(--text)';
            
            loadEkstre(id);
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        function loadEkstre(cariId) {
            const cariIslemler = islemler.filter(i => i.cariId === cariId).sort((a, b) => b.id - a.id);
            
            let biriken = 0;
            const sortedOldest = [...cariIslemler].sort((a, b) => a.id - b.id);
            sortedOldest.forEach(i => {
                if (i.tip === 'tahsilat') biriken -= i.tutar;
                else biriken += i.tutar;
            });
            
            const devir = selectedCari.bakiye - biriken;
            
            document.getElementById('ekstreBakiye').textContent = '₺ ' + devir.toLocaleString();
            
            if (cariIslemler.length === 0) {
                document.getElementById('ekstreList').innerHTML = '<div class="empty" style="padding:2rem;">İşlem bulunamadı</div>';
                return;
            }
            
            let html = '';
            let current = devir;
            
            if (devir !== 0) {
                html += `
                    <div class="ekstre-item">
                        <span class="date">${selectedCari.olusturma || '01.01.2024'}</span>
                        <span class="desc">Devir</span>
                        <span class="amount">₺ ${devir.toLocaleString()}</span>
                    </div>
                `;
            }
            
            cariIslemler.forEach(i => {
                html += `
                    <div class="ekstre-item">
                        <span class="date">${i.tarih}</span>
                        <span class="desc">${i.tip === 'tahsilat' ? 'Tahsilat' : 'Ödeme'}${i.aciklama ? ' - ' + i.aciklama : ''}</span>
                        <span class="amount" style="color:${i.tip === 'tahsilat' ? 'var(--success)' : 'var(--danger)'}">
                            ${i.tip === 'tahsilat' ? '-' : '+'}₺ ${i.tutar.toLocaleString()}
                        </span>
                    </div>
                `;
            });
            
            html += `
                <div class="ekstre-item" style="background:var(--light);font-weight:700;">
                    <span class="date">-</span>
                    <span class="desc">Güncel Bakiye</span>
                    <span class="amount">₺ ${selectedCari.bakiye.toLocaleString()}</span>
                </div>
            `;
            
            document.getElementById('ekstreList').innerHTML = html;
        }
        
        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        function openIslem(type) {
            islemType = type;
            document.getElementById('islemTitle').textContent = type === 'tahsilat' ? '💰 Tahsilat' : '💸 Ödeme';
            document.getElementById('islemTutar').value = '';
            document.getElementById('islemAciklama').value = '';
            document.getElementById('islemModal').classList.add('active');
        }
        
        function closeIslem() {
            document.getElementById('islemModal').classList.remove('active');
        }
        
        function saveIslem() {
            const tutar = parseFloat(document.getElementById('islemTutar').value) || 0;
            const aciklama = document.getElementById('islemAciklama').value;
            
            if (!tutar || tutar <= 0) { alert('Lütfen geçerli bir tutar girin!'); return; }
            
            islemler.push({
                id: Date.now(),
                cariId: selectedCari.id,
                cariAd: selectedCari.ad,
                tip: islemType,
                tutar: tutar,
                aciklama: aciklama,
                tarih: new Date().toLocaleDateString('tr-TR'),
                saat: new Date().toLocaleTimeString('tr-TR')
            });
            localStorage.setItem('aykasoft_islemler_' + currentUser.id, JSON.stringify(islemler));
            
            if (islemType === 'tahsilat') {
                selectedCari.bakiye -= tutar;
            } else {
                selectedCari.bakiye -= tutar;
            }
            selectedCari.guncellenme = new Date().toLocaleDateString('tr-TR');
            
            localStorage.setItem('aykasoft_cari_' + currentUser.id, JSON.stringify(cariler));
            
            alert('İşlem kaydedildi!');
            closeIslem();
            closeDetail();
            renderCariler();
        }
    </script>
</body>
</html>
