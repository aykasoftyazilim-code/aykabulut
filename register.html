<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - AYKASOFT</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --accent: #06b6d4;
            --dark: #0f172a;
            --light: #f8fafc;
            --light-secondary: #e2e8f0;
            --white: #ffffff;
            --text: #334155;
            --text-light: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --tl: #c9242e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--light-secondary);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        .checkbox-group input {
            margin-top: 0.25rem;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }

        .login-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .alert {
            padding: 0.875rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <div class="logo-icon">AY</div>
            <div class="logo-text">AYKA<span>SOFT</span></div>
        </div>

        <h1>Hesap Oluşturun</h1>
        <p class="subtitle">Ücretsiz denemeye başlayın</p>

        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Ad</label>
                    <input type="text" class="form-input" id="firstName" placeholder="Ahmet" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Soyad</label>
                    <input type="text" class="form-input" id="lastName" placeholder="Yılmaz" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">E-posta</label>
                <input type="email" class="form-input" id="email" placeholder="eposta@ornek.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Telefon</label>
                <input type="tel" class="form-input" id="phone" placeholder="0532 123 4567">
            </div>

            <div class="form-group">
                <label class="form-label">Firma Adı</label>
                <input type="text" class="form-input" id="company" placeholder="Firma Ltd. Şti." required>
            </div>

            <div class="form-group">
                <label class="form-label">Şifre</label>
                <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label">Şifre Tekrar</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    <a href="#">Kullanım Şartları</a> ve <a href="#">Gizlilik Politikası</a>'nı kabul ediyorum
                </label>
            </div>

            <button type="submit" class="btn btn-primary">Hesap Oluştur</button>
        </form>

        <p class="login-link">
            Zaten hesabınız var mı? <a href="login.html">Giriş yapın</a>
        </p>
    </div>

    <script>
        const alertContainer = document.getElementById('alertContainer');
        const registerForm = document.getElementById('registerForm');

        function showAlert(message, type = 'error') {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertContainer.innerHTML = '', 5000);
        }

        // Demo DB erişimi
        let demoDB;
        const dbScript = document.createElement('script');
        dbScript.textContent = `
            demoDB = {
                users: JSON.parse(localStorage.getItem('aykasoft_users') || '[]'),
                currentUser: JSON.parse(localStorage.getItem('aykasoft_currentUser') || 'null')
            };
        `;
        document.head.appendChild(dbScript);

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('Şifreler eşleşmiyor!', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Şifre en az 6 karakter olmalı!', 'error');
                return;
            }

            // Kullanıcı kontrolü
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('aykasoft_users') || '[]');
                
                if (users.find(u => u.email === email)) {
                    showAlert('Bu e-posta zaten kayıtlı!', 'error');
                    return;
                }

                const newUser = {
                    id: 'user_' + Date.now(),
                    email: email,
                    password: password,
                    name: firstName + ' ' + lastName,
                    phone: phone,
                    company: company,
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                localStorage.setItem('aykasoft_users', JSON.stringify(users));
                localStorage.setItem('aykasoft_currentUser', JSON.stringify(newUser));

                // Varsayılan ürünleri ekle
                const defaultProducts = [
                    { barcode: '869123456001', name: 'Klavye', price: 450, stock: 25, category: 'cevre' },
                    { barcode: '869123456002', name: 'Mouse', price: 280, stock: 30, category: 'cevre' },
                    { barcode: '869123456003', name: 'Monitor', price: 2100, stock: 12, category: 'bilgisayar' },
                    { barcode: '869123456004', name: 'SSD 500GB', price: 890, stock: 18, category: 'bilgisayar' },
                    { barcode: '869123456005', name: 'Kulaklık', price: 350, stock: 22, category: 'aksesuar' },
                    { barcode: '869123456006', name: 'KUMANDA', price: 120, stock: 45, category: 'akisuar' },
                ];
                localStorage.setItem('aykasoft_products_' + newUser.id, JSON.stringify(defaultProducts));

                // Varsayılan müşterileri ekle
                const defaultCustomers = [
                    { id: 1, name: 'Mehmet Kaya', phone: '0532 123 4567', email: 'mehmet@kaya.com', address: 'Fatih Mah. No:15', debt: 12500, credit: 0 },
                    { id: 2, name: 'Ayşe Ltd. Şti.', phone: '0212 234 5678', email: 'bilgi@ayse.com', address: 'Mecidiyeköy No:22', debt: 0, credit: 8500 },
                    { id: 3, name: 'Hasan A.', phone: '0535 890 1234', email: 'hasan@mail.com', address: 'Kadıköy No:8', debt: 1000, credit: 0 },
                ];
                localStorage.setItem('aykasoft_customers_' + newUser.id, JSON.stringify(defaultCustomers));

                showAlert('✅ Hesabınız oluşturuldu!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            }, 500);
        });
    </script>
</body>
</html>
