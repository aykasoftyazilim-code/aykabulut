<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYKASOFT - Satış</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; --accent: #06b6d4; --dark: #0f172a; --light: #f8fafc; --light-secondary: #e2e8f0; --white: #ffffff; --text: #334155; --text-light: #64748b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --tl: #c9242e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 700; }
        .tl { color: var(--tl); font-weight: 700; }
        
        /* Header */
        .header { background: var(--dark); color: white; padding: 1rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
        .header a { color: white; text-decoration: none; font-size: 1.25rem; }
        .header h1 { flex: 1; font-size: 1.1rem; }
        
        /* Barcode Input */
        .barcode-container { background: white; padding: 1rem; display: flex; gap: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .barcode-input { flex: 1; padding: 0.875rem; border: 2px solid var(--light-secondary); border-radius: 10px; font-size: 1.1rem; }
        .barcode-input:focus { outline: none; border-color: var(--primary); }
        .scan-btn { width: 50px; border: none; border-radius: 10px; background: var(--primary); color: white; font-size: 1.5rem; cursor: pointer; }
        
        /* Layout */
        .pos-layout { display: grid; grid-template-columns: 1fr 350px; height: calc(100vh - 140px); }
        
        /* Products */
        .products-panel { overflow-y: auto; padding: 1rem; }
        
        /* Categories */
        .categories { display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .category { padding: 0.5rem 1rem; background: white; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--light-secondary); }
        .category.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Product Grid */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
        .product-card { background: white; border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .product-card:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-icon { width: 50px; height: 50px; background: var(--light); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 1.5rem; }
        .product-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
        .product-price { color: var(--tl); font-weight: 700; }
        
        /* Cart */
        .cart-panel { background: white; border-left: 1px solid var(--light-secondary); display: flex; flex-direction: column; }
        .cart-header { padding: 1rem; border-bottom: 1px solid var(--light-secondary); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: var(--light); border-radius: 10px; margin-bottom: 0.5rem; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9rem; }
        .cart-item-price { color: var(--text-light); font-size: 0.85rem; }
        .cart-qty { display: flex; align-items: center; gap: 0.5rem; }
        .qty-btn { width: 28px; height: 28px; border: none; border-radius: 8px; background: white; cursor: pointer; font-weight: 700; }
        .cart-qty span { font-weight: 600; min-width: 20px; text-align: center; }
        .cart-item-total { font-weight: 700; font-size: 0.95rem; }
        .delete-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; }
        
        /* Cart Summary */
        .cart-summary { padding: 1rem; border-top: 1px solid var(--light-secondary); background: var(--light); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .summary-row.total { font-size: 1.25rem; font-weight: 700; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--light-secondary); }
        
        /* Cart Actions */
        .cart-actions { padding: 1rem; display: flex; gap: 0.5rem; }
        .cart-actions button { flex: 1; padding: 1rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn-sale { background: var(--success); color: white; }
        .btn-clear { background: var(--light); color: var(--text); }
        
        /* Empty Cart */
        .empty-cart { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
        
        /* Mobile */
        .mobile-nav { display: none; }
        @media (max-width: 768px) {
            .pos-layout { grid-template-columns: 1fr; }
            .cart-panel { position: fixed; bottom: 70px; left: 0; right: 0; height: 45vh; border-left: none; border-top: 2px solid var(--light-secondary); }
            .cart-header { padding: 0.75rem; }
            .cart-items { padding: 0.75rem; }
            .products-panel { height: calc(45vh - 80px); overflow-y: auto; }
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
            .product-card { padding: 0.75rem; }
            .product-icon { width: 40px; height: 40px; font-size: 1.25rem; }
            .product-name { font-size: 0.8rem; }
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); padding: 0.5rem; justify-content: space-around; z-index: 1000; }
            .mobile-nav a { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.7rem; }
            .mobile-nav a.active { color: white; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="dashboard.html">←</a>
        <h1>🏷️ Barkodlu Satış</h1>
    </header>
    
    <div class="barcode-container">
        <input type="text" class="barcode-input" id="barcodeInput" placeholder="Barkod numarası girin..." onkeyup="searchBarcode(event)">
        <button class="scan-btn" onclick="openScanner()">📷</button>
    </div>
    
    <div class="pos-layout">
        <div class="products-panel">
            <div class="categories">
                <div class="category active" onclick="filterCategory('all')">Tümü</div>
                <div class="category" onclick="filterCategory('elektronik')">Elektronik</div>
                <div class="category" onclick="filterCategory('aksesuar')">Aksesuar</div>
                <div class="category" onclick="filterCategory('bilgisayar')">Bilgisayar</div>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
        
        <div class="cart-panel">
            <div class="cart-header">
                <h3>🛒 Sepet</h3>
                <span id="cartCount">0 ürün</span>
            </div>
            <div class="cart-items" id="cartItems">
                <div class="empty-cart">Sepetiniz boş</div>
            </div>
            <div class="cart-summary" id="cartSummary" style="display:none;">
                <div class="summary-row"><span>Ara Toplam</span><span id="subtotal">₺ 0</span></div>
                <div class="summary-row"><span>KDV (%18)</span><span id="tax">₺ 0</span></div>
                <div class="summary-row total"><span>GENEL TOPLAM</span><span class="tl" id="total">₺ 0</span></div>
            </div>
            <div class="cart-actions">
                <button class="btn-sale" onclick="processSale()">💰 SAT</button>
                <button class="btn-clear" onclick="clearCart()">Temizle</button>
            </div>
        </div>
    </div>
    
    <nav class="mobile-nav">
        <a href="dashboard.html"><span>🏠</span><span>Panel</span></a>
        <a href="satis.html" class="active"><span>🏷️</span><span>Satış</span></a>
        <a href="saha.html"><span>📱</span><span>Saha</span></a>
        <a href="rapor.html"><span>📊</span><span>Rapor</span></a>
        <a href="ayarlar.html"><span>⚙️</span><span>Ayarlar</span></a>
    </nav>
    
    <script>
        const currentUser = JSON.parse(localStorage.getItem('aykasoft_currentUser'));
        if (!currentUser) window.location.href = 'login.html';
        
        const products = [
            {barcode:'869123456001',name:'Klavye',category:'elektronik',price:450,icon:'⌨️'},
            {barcode:'869123456002',name:'Mouse',category:'elektronik',price:280,icon:'🖱️'},
            {barcode:'869123456003',name:'Monitor',category:'bilgisayar',price:2100,icon:'🖥️'},
            {barcode:'869123456004',name:'SSD 500GB',category:'bilgisayar',price:890,icon:'💾'},
            {barcode:'869123456005',name:'Kulaklık',category:'elektronik',price:350,icon:'🎧'},
            {barcode:'869123456006',name:'USB Kablo',category:'aksesuar',price:80,icon:'🔌'},
            {barcode:'869123456007',name:'Webcam',category:'elektronik',price:590,icon:'📷'},
            {barcode:'869123456008',name:'USB Hub',category:'aksesuar',price:250,icon:'🔗'},
            {barcode:'869123456009',name:'Kablo Set',category:'aksesuar',price:150,icon:'🔌'},
            {barcode:'869123456010',name:'Mouse Pad',category:'aksesuar',price:80,icon:'🟦'},
            {barcode:'869123456011',name:'Ekran Kartı',category:'bilgisayar',price:8500,icon:'🎮'},
            {barcode:'869123456012',name:'RAM 16GB',category:'bilgisayar',price:1200,icon:'💻'},
        ];
        
        let cart = [];
        
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.filter(p => filter === 'all' || p.category === filter).map(p => `
                <div class="product-card" onclick="addToCart('${p.barcode}')">
                    <div class="product-icon">${p.icon}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price tl">₺ ${p.price}</div>
                </div>
            `).join('');
        }
        
        function filterCategory(cat) {
            document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }
        
        function addToCart(barcode) {
            const product = products.find(p => p.barcode === barcode);
            if (!product) return;
            const existing = cart.find(c => c.barcode === barcode);
            if (existing) existing.qty++;
            else cart.push({...product, qty: 1});
            renderCart();
        }
        
        function renderCart() {
            const items = document.getElementById('cartItems');
            const summary = document.getElementById('cartSummary');
            if (cart.length === 0) {
                items.innerHTML = '<div class="empty-cart">Sepetiniz boş</div>';
                summary.style.display = 'none';
                document.getElementById('cartCount').textContent = '0 ürün';
                return;
            }
            summary.style.display = 'block';
            document.getElementById('cartCount').textContent = cart.length + ' ürün';
            items.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price tl">₺ ${item.price}</div>
                    </div>
                    <div class="cart-qty">
                        <button class="qty-btn" onclick="changeQty(${i}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                    </div>
                    <div class="cart-item-total tl">₺ ${(item.price * item.qty).toLocaleString()}</div>
                    <button class="delete-btn" onclick="removeItem(${i})">🗑️</button>
                </div>
            `).join('');
            
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const tax = subtotal * 0.18;
            document.getElementById('subtotal').textContent = '₺ ' + subtotal.toLocaleString();
            document.getElementById('tax').textContent = '₺ ' + Math.round(tax).toLocaleString();
            document.getElementById('total').textContent = '₺ ' + (subtotal + Math.round(tax)).toLocaleString();
        }
        
        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
        }
        
        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function clearCart() {
            if (confirm('Sepeti temizlemek istediğinize emin misiniz?')) {
                cart = [];
                renderCart();
            }
        }
        
        function searchBarcode(e) {
            if (e.key === 'Enter') {
                const code = e.target.value.trim();
                const product = products.find(p => p.barcode === code);
                if (product) addToCart(code);
                else if (code.length >= 8) alert('Ürün bulunamadı: ' + code);
                e.target.value = '';
            }
        }
        
        function openScanner() {
            window.location.href = 'scanner.html';
        }
        
        function processSale() {
            if (cart.length === 0) { alert('Sepetiniz boş!'); return; }
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0) * 1.18;
            if (confirm('Toplam: ₺ ' + total.toLocaleString() + '\n\nSatışı tamamlamak istiyor musunuz?')) {
                const sales = JSON.parse(localStorage.getItem('aykasoft_sales_' + currentUser.id)) || [];
                sales.push({
                    id: 'S' + Date.now(),
                    date: new Date().toLocaleDateString('tr-TR'),
                    items: cart,
                    total: total,
                    type: 'nakit'
                });
                localStorage.setItem('aykasoft_sales_' + currentUser.id, JSON.stringify(sales));
                alert('✅ Satış tamamlandı!');
                cart = [];
                renderCart();
            }
        }
        
        function logout() {
            localStorage.removeItem('aykasoft_currentUser');
            window.location.href = 'login.html';
        }
        
        renderProducts();
    </script>
</body>
</html>
