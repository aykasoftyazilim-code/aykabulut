<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saha Satışı - AYKASOFT</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --light-secondary: #e2e8f0; --text: #334155; --text-light: #64748b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --tl: #c9242e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--dark); color: white; padding: 1rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
        .header a { color: white; text-decoration: none; font-size: 1.25rem; }
        .header h1 { flex: 1; font-size: 1.1rem; font-family: 'Outfit', sans-serif; font-weight: 700; }
        
        .main { padding: 1rem; padding-bottom: 80px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 14px; padding: 1rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.8rem; color: var(--text-light); }
        
        .customer-select { background: white; border-radius: 14px; padding: 1rem; margin-bottom: 1rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .customer-select h3 { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .customer-select p { color: var(--text-light); font-size: 0.85rem; }
        
        .section-title { font-size: 1rem; margin-bottom: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 700; }
        
        .products-list { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .product-row { display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid var(--light-secondary); cursor: pointer; }
        .product-row:last-child { border-bottom: none; }
        .product-row:hover { background: var(--light); }
        .product-icon { width: 44px; height: 44px; background: var(--light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; margin-right: 1rem; }
        .product-info { flex: 1; }
        .product-info h4 { font-size: 0.95rem; }
        .product-info p { font-size: 0.8rem; color: var(--text-light); }
        .product-price { font-weight: 700; color: var(--tl); }
        
        .cart-preview { background: white; border-radius: 14px; padding: 1rem; margin-top: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cart-preview h3 { margin-bottom: 0.75rem; }
        .cart-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--light-secondary); }
        .cart-total { display: flex; justify-content: space-between; padding-top: 0.75rem; font-weight: 700; font-size: 1.25rem; }
        
        .order-btn { position: fixed; bottom: 70px; left: 0; right: 0; padding: 1rem; background: white; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); }
        .order-btn button { width: 100%; padding: 1rem; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 1.5rem; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.25rem; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--light); border: none; font-size: 1.25rem; cursor: pointer; }
        
        .customer-item { display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid var(--light-secondary); cursor: pointer; }
        .customer-item:hover { background: var(--light); }
        .customer-icon { width: 44px; height: 44px; background: #dbeafe; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 1rem; font-weight: 700; }
        .customer-info { flex: 1; }
        .customer-info h4 { font-size: 0.95rem; }
        .customer-info p { font-size: 0.8rem; color: var(--text-light); }
        
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        .btn-secondary { background: var(--light); color: var(--text); }
        
        .mobile-nav { display: none; }
        @media (max-width: 768px) {
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); padding: 0.5rem; justify-content: space-around; z-index: 1000; }
            .mobile-nav a { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.7rem; }
            .mobile-nav a.active { color: white; }
            .order-btn { bottom: 70px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="dashboard.html">←</a>
        <h1>📱 Saha Satışı</h1>
    </header>
    
    <main class="main">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="todayVisit">0</div>
                <div class="stat-label">Bugün Ziyaret</div>
            </div>
            <div class="stat-card">
                <div class="stat-value tl" id="todaySales">₺ 0</div>
                <div class="stat-label">Bugün Satış</div>
            </div>
        </div>
        
        <div class="customer-select" onclick="openCustomerModal()">
            <h3>👤 Müşteri Seçin</h3>
            <p id="selectedCustomer">Henüz müşteri seçilmedi</p>
        </div>
        
        <h2 class="section-title">📦 Ürünler</h2>
        <div class="products-list" id="productsList"></div>
        
        <div class="cart-preview" id="cartPreview" style="display:none;">
            <h3>🛒 Sipariş Özeti</h3>
            <div id="cartItems"></div>
            <div class="cart-total">
                <span>Toplam</span>
                <span class="tl" id="cartTotal">₺ 0</span>
            </div>
        </div>
    </main>
    
    <div class="order-btn">
        <button onclick="createOrder()">📤 Sipariş Ver</button>
    </div>
    
    <!-- Customer Modal -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>👥 Müşteri Seç</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="customerList"></div>
            <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
        </div>
    </div>
    
    <nav class="mobile-nav">
        <a href="dashboard.html"><span>🏠</span><span>Panel</span></a>
        <a href="satis.html"><span>🏷️</span><span>Satış</span></a>
        <a href="saha.html" class="active"><span>📱</span><span>Saha</span></a>
        <a href="rapor.html"><span>📊</span><span>Rapor</span></a>
        <a href="ayarlar.html"><span>⚙️</span><span>Ayarlar</span></a>
    </nav>
    
    <script>
        const currentUser = JSON.parse(localStorage.getItem('aykasoft_currentUser'));
        if (!currentUser) window.location.href = 'login.html';
        
        let cariler = JSON.parse(localStorage.getItem('aykasoft_cari_' + currentUser.id)) || [
            {id:1, ad:'Ahmet Yılmaz', tel:'0532 123 4567', adres:'Selçuklu, Konya', bakiye:12500},
            {id:2, ad:'Mehmet Kaya', tel:'0533 234 5678', adres:'Meram, Konya', bakiye:8900},
            {id:3, ad:'Ali Demir', tel:'0544 345 6789', adres:'Çumra, Konya', bakiye:15400},
            {id:4, ad:'Ayşe Fatma', tel:'0535 456 7890', adres:'Karatay, Konya', bakiye:0},
            {id:5, ad:'Fatma Ali', tel:'0546 567 8901', adres:'Sarayönü, Konya', bakiye:0},
        ];
        
        let products = JSON.parse(localStorage.getItem('aykasoft_products_' + currentUser.id)) || [
            {barcode:'869123456001',name:'Klavye',price:450,icon:'⌨️'},
            {barcode:'869123456002',name:'Mouse',price:280,icon:'🖱️'},
            {barcode:'869123456005',name:'Kulaklık',price:350,icon:'🎧'},
            {barcode:'869123456007',name:'Webcam',price:590,icon:'📷'},
            {barcode:'869123456008',name:'USB Hub',price:250,icon:'🔗'},
        ];
        
        let selectedCustomer = null;
        let cart = [];
        
        renderCariler();
        renderProducts();
        loadStats();
        
        function renderCariler() {
            document.getElementById('customerList').innerHTML = cariler.map(c => `
                <div class="customer-item" onclick="selectCustomer(${c.id})">
                    <div class="customer-icon">${c.ad[0]}</div>
                    <div class="customer-info">
                        <h4>${c.ad}</h4>
                        <p>${c.tel} • ${c.adres}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function renderProducts() {
            document.getElementById('productsList').innerHTML = products.map(p => `
                <div class="product-row" onclick="addProduct('${p.barcode}')">
                    <div class="product-icon">${p.icon}</div>
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <p>${p.barcode}</p>
                    </div>
                    <div class="product-price tl">₺ ${p.price}</div>
                </div>
            `).join('');
        }
        
        function loadStats() {
            const orders = JSON.parse(localStorage.getItem('aykasoft_orders_' + currentUser.id)) || [];
            const today = new Date().toLocaleDateString('tr-TR');
            const todayOrders = orders.filter(o => o.date === today);
            
            document.getElementById('todayVisit').textContent = todayOrders.length;
            document.getElementById('todaySales').textContent = '₺ ' + todayOrders.reduce((s, o) => s + (o.total || 0), 0).toLocaleString();
        }
        
        function openCustomerModal() { document.getElementById('customerModal').classList.add('active'); }
        function closeModal() { document.getElementById('customerModal').classList.remove('active'); }
        
        function selectCustomer(id) {
            selectedCustomer = cariler.find(c => c.id === id);
            document.getElementById('selectedCustomer').textContent = selectedCustomer.ad + ' • ' + selectedCustomer.tel;
            closeModal();
        }
        
        function addProduct(barcode) {
            const product = products.find(p => p.barcode === barcode);
            if (!product) return;
            
            const existing = cart.find(p => p.barcode === barcode);
            if (existing) existing.qty++;
            else cart.push({...product, qty: 1});
            renderCart();
        }
        
        function renderCart() {
            const preview = document.getElementById('cartPreview');
            if (cart.length === 0) { preview.style.display = 'none'; return; }
            preview.style.display = 'block';
            
            document.getElementById('cartItems').innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.icon} ${item.name} x${item.qty}</span>
                    <span class="tl">₺ ${(item.price * item.qty).toLocaleString()}</span>
                </div>
            `).join('');
            
            document.getElementById('cartTotal').textContent = '₺ ' + cart.reduce((s, i) => s + i.price * i.qty, 0).toLocaleString();
        }
        
        function createOrder() {
            if (!selectedCustomer) { alert('Lütfen müşteri seçin!'); return; }
            if (cart.length === 0) { alert('Sepetiniz boş!'); return; }
            
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const total = subtotal * 1.18;
            
            const orders = JSON.parse(localStorage.getItem('aykasoft_orders_' + currentUser.id)) || [];
            orders.push({
                id: 'ORD' + Date.now(),
                date: new Date().toLocaleDateString('tr-TR'),
                customer: {id: selectedCustomer.id, ad: selectedCustomer.ad, tel: selectedCustomer.tel},
                items: cart.map(c => ({name: c.name, price: c.price, qty: c.qty})),
                subtotal: subtotal,
                total: total,
                status: 'Bekliyor'
            });
            localStorage.setItem('aykasoft_orders_' + currentUser.id, JSON.stringify(orders));
            
            // Update cari bakiye
            const cari = cariler.find(c => c.id === selectedCustomer.id);
            if (cari) cari.bakiye += total;
            localStorage.setItem('aykasoft_cari_' + currentUser.id, JSON.stringify(cariler));
            
            alert('✅ Sipariş oluşturuldu!');
            cart = [];
            renderCart();
            loadStats();
        }
        
        function logout() {
            localStorage.removeItem('aykasoft_currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
